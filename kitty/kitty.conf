# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="Cascadia Code PL"
bold_font        auto
italic_font      auto
bold_italic_font auto

# END_KITTY_FONTS

# BEGIN_KITTY_TAB_BAR
tab_bar_style powerline
# END_KITTY_TAB_BAR

# Window Settings
window_padding_width 5
background_opacity 0.85
