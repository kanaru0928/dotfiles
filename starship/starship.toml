format = '[[ $symbol $branch ](fg:crust bg:lavender)]($style)'

[git_status]
style = "bg:lavender"
format = '[[($all_status$ahead_behind )](fg:crust bg:lavender)]($style)'

[time]
disabled = false
time_format = "%T"
style = "bg:lavender"
format = '[[ ïگ؛ $time ](fg:crust bg:lavender)]($style)'

[fill]
